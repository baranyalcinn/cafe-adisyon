name: Build Cafe Adisyon

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Actions runner'larını Node.js 24'e opt-in et
# Haziran 2026'dan itibaren Node 20 runner'ları deprecated olacak
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      # Swap Alanı (8GB) - Electron-builder + Prisma generate için RAM taşmasını önler
      - name: Set Pagefile (Swap)
        uses: al-cheb/configure-pagefile-action@v1.4
        with:
          minimum-size: 8GB
          maximum-size: 8GB
          disk-root: 'C:'

      - name: Node.js Kur (v24 - Electron 41 embedded Node)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # npm ci: package-lock.json'dan deterministik kurulum.
      # postinstall → electron-builder install-app-deps:
      #   better-sqlite3 için Electron 41 prebuilt binary otomatik indirilir.
      #   Kaynak derleme gerekmez, ayrı rebuild adımına gerek yok.
      - name: Bağımlılıkları Kur (Deterministik)
        run: npm ci

      - name: Temiz Şablon DB Oluştur
        run: |
          # Prisma v7: --url ve --skip-generate kaldırıldı.
          # prisma.config.ci.ts ile template.db hedeflenir, prisma generate otomatik çalışmaz.
          if (Test-Path prisma/template.db) { Remove-Item prisma/template.db }
          npx prisma db push --config prisma.config.ci.ts --accept-data-loss

      - name: TypeScript Build
        run: npm run build

      - name: Windows EXE Oluştur
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npx electron-builder --win --x64 --publish never

      - name: Build Sonucunu Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Caffio-Builds
          path: dist/*.exe
          retention-days: 5
